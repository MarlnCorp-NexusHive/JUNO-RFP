<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .purple { fill: none; stroke: #6B2CBF; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .purple-fill { fill: #6B2CBF; }
      .purple-line { stroke: #6B2CBF; stroke-width: 2.5; stroke-linecap: round; }
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; fill: #6B2CBF; }
      .tagline-text { font-family: Arial, sans-serif; font-weight: normal; fill: #6B2CBF; font-size: 12px; }
    </style>
  </defs>
  
  <!-- Graphic Element: Three interconnected hexagons -->
  <!-- Bottom-left hexagon -->
  <path d="M 50 100 L 35 90 L 35 70 L 50 60 L 65 70 L 65 90 Z" class="purple"/>
  
  <!-- Bottom-right hexagon -->
  <path d="M 120 100 L 105 90 L 105 70 L 120 60 L 135 70 L 135 90 Z" class="purple"/>
  
  <!-- Top hexagon -->
  <path d="M 85 50 L 70 40 L 55 50 L 55 70 L 70 80 L 85 70 Z" class="purple"/>
  
  <!-- Three solid circles in center forming a triangle -->
  <circle cx="65" cy="75" r="5" class="purple-fill"/>
  <circle cx="105" cy="75" r="5" class="purple-fill"/>
  <circle cx="85" cy="60" r="5" class="purple-fill"/>
  
  <!-- Lines connecting circles to form triangle -->
  <line x1="65" y1="75" x2="105" y2="75" class="purple-line"/>
  <line x1="65" y1="75" x2="85" y2="60" class="purple-line"/>
  <line x1="105" y1="75" x2="85" y2="60" class="purple-line"/>
  
  <!-- Lines connecting each circle to its corresponding hexagon inner edge -->
  <!-- Top circle to top hexagon -->
  <line x1="85" y1="60" x2="85" y2="50" class="purple-line"/>
  
  <!-- Bottom-left circle to bottom-left hexagon -->
  <line x1="65" y1="75" x2="55" y2="90" class="purple-line"/>
  
  <!-- Bottom-right circle to bottom-right hexagon -->
  <line x1="105" y1="75" x2="115" y2="90" class="purple-line"/>
  
  <!-- Text Element: NexusHive -->
  <text x="150" y="60" class="logo-text" font-size="36">NexusHive</text>
  
  <!-- Tagline: KEEP LEARNING, KEEP BUZZING -->
  <text x="150" y="85" class="tagline-text" font-size="11" letter-spacing="1">KEEP LEARNING, KEEP BUZZING</text>
</svg>
